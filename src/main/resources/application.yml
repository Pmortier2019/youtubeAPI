server:
  port: ${PORT:8080}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:soundtracker}
    username: ${PGUSER:soundtracker}
    password: ${PGPASSWORD:soundtracker}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

youtube:
  apiKey: ${YOUTUBE_API_KEY:changeme}
  baseUrl: https://www.googleapis.com/youtube/v3
  batchSize: 50

scheduler:
  enabled: true
  cron: "0 15 2 * * *"

jwt:
  secret: ${JWT_SECRET:changeme-set-a-strong-secret-in-production-min-32-chars}
  expirationMs: 86400000